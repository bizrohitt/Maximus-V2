<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{ subject }}</title>
</head>
<body style="font-family: system-ui, sans-serif; max-width: 600px; margin: 0 auto; padding: 40px 20px;">
    <div style="background: #ffffff; padding: 40px; border-radius: 12px; border: 1px solid #eee;">
        <h1 style="color: #111827; font-size: 24px;">Hello {{ name }},</h1>
        
        <div style="margin: 30px 0; line-height: 1.7; color: #374151;">
            {{ content|safe }}
        </div>
        
        <hr style="border: none; border-top: 1px solid #eee; margin: 40px 0;">
        
        <p style="font-size: 13px; color: #6B7280;">
            You're receiving this email because you subscribed to Maximus.
            <a href="#" style="color: #B5300A;">Unsubscribe</a>
        </p>
    </div>
</body>
</html>
